version: '3.8'
services:
  amani-nexus:
    build: .
    ports:
      - "8081:8080"
    environment:
      - NODE_ENV=production
      - GOOGLE_SHEET_ID=${GOOGLE_SHEET_ID}
    restart: always

  amani-dashboard:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_INSTALL_PLUGINS=grafana-worldmap-panel
    volumes:
      - ./grafana_data:/var/lib/grafana

  amani-db:
    image: postgres:15
    environment:
      POSTGRES_PASSWORD: ${DB_PASS}
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
